<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card – CodingLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="card">

  <!-- banner -->
  <div class="banner"></div>

  <!-- avatar -->
  <div class="avatar-wrap">
    <div class="avatar">
      <!-- SVG placeholder person -->
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="#3B6FFF">
        <circle cx="32" cy="22" r="12"/>
        <path d="M8 56c0-13.255 10.745-24 24-24s24 10.745 24 24"/>
      </svg>
    </div>
  </div>

  <!-- body -->
  <div class="body">
    <p class="name">CodingLab</p>
    <p class="role">YouTuber &amp; Blogger</p>

    <!-- socials -->
    <div class="socials">
      <!-- Facebook -->
      <button class="social-btn fb" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </button>
      <!-- Twitter / X -->
      <button class="social-btn tw" aria-label="Twitter">
        <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
      </button>
      <!-- Instagram -->
      <button class="social-btn ig" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" fill="none" stroke="#fff" stroke-width="2"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <!-- YouTube -->
      <button class="social-btn yt" aria-label="YouTube">
        <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/></svg>
      </button>
    </div>

    <!-- action buttons -->
    <div class="actions">
      <button class="btn btn-primary">Subscribe</button>
      <button class="btn btn-outline">Message</button>
    </div>

    <!-- stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>
        <span class="stat-value">60k</span>
        <span class="stat-label">Likes</span>
      </div>
      <div class="stat">
        <span class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="stat-value">20k</span>
        <span class="stat-label">Comments</span>
      </div>
      <div class="stat">
        <span class="stat-icon">
          <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </span>
        <span class="stat-value">12k</span>
        <span class="stat-label">Shares</span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
